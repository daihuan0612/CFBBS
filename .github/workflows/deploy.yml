name: Deploy CFBBS to Cloudflare

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Pages + Workers + D1 + R2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Ensure D1 database exists
        run: |
          set -euo pipefail
          DB_ID=$(npx wrangler d1 list --json | node -e '
            let input = "";
            process.stdin.on("data", c => input += c);
            process.stdin.on("end", () => {
              const list = JSON.parse(input);
              const db = Array.isArray(list) ? list.find(item => item.name === "cforum-db") : null;
              process.stdout.write(db?.uuid ?? "");
            });
          ')
          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database cforum-db..."
            npx wrangler d1 create cforum-db
            DB_ID=$(npx wrangler d1 list --json | node -e '
              let input = "";
              process.stdin.on("data", c => input += c);
              process.stdin.on("end", () => {
                const list = JSON.parse(input);
                const db = Array.isArray(list) ? list.find(item => item.name === "cforum-db") : null;
                process.stdout.write(db?.uuid ?? "");
              });
            ')
          fi
          if [ -z "$DB_ID" ]; then
            echo "Failed to resolve D1 database id for cforum-db"
            exit 1
          fi
          sed -i -E "s/\"database_id\": \"[^\"]+\"/\"database_id\": \"$DB_ID\"/" wrangler.jsonc
          echo "D1 database id: $DB_ID"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Run D1 migrations
        run: npx wrangler d1 migrations apply cforum-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Ensure R2 bucket exists
        run: |
          if npx wrangler r2 bucket list | grep -q "cforum-images"; then
            echo "R2 bucket cforum-images already exists"
          else
            echo "Creating R2 bucket cforum-images"
            npx wrangler r2 bucket create cforum-images
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy

      - name: Upload JWT_SECRET
        run: npx wrangler secret put JWT_SECRET <<< "$JWT_SECRET"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload WORKER_URL (auto from account)
        run: |
          WORKER_URL="https://cfbbs.$CLOUDFLARE_ACCOUNT_ID.workers.dev"
          npx wrangler secret put WORKER_URL <<< "$WORKER_URL"
          echo "WORKER_URL set to $WORKER_URL"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Upload admin credentials
        run: |
          if [ -n "$ADMIN_EMAIL" ]; then
            npx wrangler secret put ADMIN_EMAIL <<< "$ADMIN_EMAIL"
          fi
          if [ -n "$ADMIN_PASSWORD" ]; then
            npx wrangler secret put ADMIN_PASSWORD <<< "$ADMIN_PASSWORD"
          fi
          if [ -n "$ADMIN_NICKNAME" ]; then
            npx wrangler secret put ADMIN_NICKNAME <<< "$ADMIN_NICKNAME"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NICKNAME: ${{ secrets.ADMIN_NICKNAME }}

      - name: Upload BASE_URL (optional)
        run: |
          if [ -n "$BASE_URL" ]; then
            npx wrangler secret put BASE_URL <<< "$BASE_URL"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Upload Turnstile secrets (optional)
        run: |
          if [ -n "$TURNSTILE_SITE_KEY" ]; then
            npx wrangler secret put TURNSTILE_SITE_KEY <<< "$TURNSTILE_SITE_KEY"
            npx wrangler secret put TURNSTILE_SECRET_KEY <<< "$TURNSTILE_SECRET_KEY"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}

      - name: Ensure Cloudflare Pages project exists
        run: |
          if npx wrangler pages project list | grep -q "cfbbs"; then
            echo "Pages project cfbbs already exists"
          else
            echo "Creating Pages project cfbbs"
            npx wrangler pages project create cfbbs --production-branch master
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy public --project-name=cfbbs

      - name: Success
        run: |
          echo "部署完成！"
          echo "Worker API: https://cfbbs.<你的用户名>.workers.dev"
          echo "Pages 站点: https://cfbbs.pages.dev"
          echo "首次访问会触发 ensureSchema 自动建表 + 创建管理员账号"