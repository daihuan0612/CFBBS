name: Deploy CFBBS to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker + D1 + R2 (assets bundled)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Infrastructure: D1 and R2 ──
      - name: Ensure D1 database exists
        run: |
          set -euo pipefail
          DB_ID=$(npx wrangler d1 list 2>&1 | grep 'cforum-db' | grep -oP '[\w]{8}-[\w]{4}-[\w]{4}-[\w]{4}-[\w]{12}' | head -1)
          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database cforum-db..."
            DB_ID=$(npx wrangler d1 create cforum-db 2>&1 | grep -oP 'database_id = "\K[^"]+')
            if [ -z "$DB_ID" ]; then
              echo "Failed to create or resolve D1 database id for cforum-db"
              exit 1
            fi
          fi
          echo "D1 database id: $DB_ID"
          sed -i "s|\"database_id\": \".*\"|\"database_id\": \"$DB_ID\"|" wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Run D1 migrations
        run: npx wrangler d1 migrations apply cforum-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Ensure R2 bucket exists
        run: |
          set -euo pipefail
          echo "Checking R2 bucket cforum-images..."
          BUCKET_LIST=$(npx wrangler r2 bucket list 2>&1)
          echo "$BUCKET_LIST"
          if echo "$BUCKET_LIST" | grep -q "cforum-images"; then
            echo "R2 bucket cforum-images already exists"
          else
            echo "Creating R2 bucket cforum-images..."
            npx wrangler r2 bucket create cforum-images
            echo "R2 bucket cforum-images created"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      # ── Worker secrets ──
      - name: Upload Worker secrets
        run: |
          npx wrangler secret put JWT_SECRET <<< "$JWT_SECRET"
          if [ -n "$ADMIN_EMAIL" ]; then
            npx wrangler secret put ADMIN_EMAIL <<< "$ADMIN_EMAIL"
          fi
          if [ -n "$ADMIN_PASSWORD" ]; then
            npx wrangler secret put ADMIN_PASSWORD <<< "$ADMIN_PASSWORD"
          fi
          if [ -n "$ADMIN_NICKNAME" ]; then
            npx wrangler secret put ADMIN_NICKNAME <<< "$ADMIN_NICKNAME"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NICKNAME: ${{ secrets.ADMIN_NICKNAME }}

      # ── Frontend: inject WORKER_URL then build ──
      - name: Inject WORKER_URL and build frontend
        run: |
          WORKER_URL="${{ secrets.WORKER_URL || '' }}"
          if [ -z "$WORKER_URL" ]; then
            echo "WORKER_URL secret not set, using default /api (same-origin)"
            WORKER_URL="__WORKER_URL__"
          fi
          echo "Injecting WORKER_URL: $WORKER_URL"
          sed -i "s|__WORKER_URL__|$WORKER_URL|g" frontend/src/lib/api.ts
          npm run build:frontend

      # ── Worker: deploy with bundled static assets ──
      - name: Deploy Worker (API + frontend assets)
        run: |
          DEPLOY_OUTPUT=$(npx wrangler deploy 2>&1)
          echo "$DEPLOY_OUTPUT"
          WORKER_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*\.workers\.dev' | head -1)
          echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
        id: worker_deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Upload BASE_URL (optional)
        run: |
          if [ -n "$BASE_URL" ]; then
            npx wrangler secret put BASE_URL <<< "$BASE_URL"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Success
        run: |
          echo "部署完成！"
          echo "Worker (API + 前端): ${{ steps.worker_deploy.outputs.worker_url }}"
          echo "前端已内嵌于 Worker assets，无需单独 Pages 部署"
